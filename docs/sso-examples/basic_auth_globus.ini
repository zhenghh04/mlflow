# MLflow auth config with Globus Auth SSO
# Globus is widely used at DOE facilities (ALCF, NERSC, OLCF).
# Register your app at: https://developers.globus.org → Register app
# Redirect URI: https://mlflow.example.com/sso/callback/globus

[mlflow]
default_permission = READ
database_uri = sqlite:////var/lib/mlflow/auth.db
admin_username = admin
admin_password = ChangeMe@Admin123!
authorization_function = mlflow.server.auth:authenticate_request_basic_auth

[sso]
enabled = true
server_url = https://mlflow.example.com

[sso.providers.globus]
provider_type = globus
name = Globus / ANL
client_id = YOUR_GLOBUS_APP_UUID
client_secret = YOUR_GLOBUS_APP_SECRET
username_claim = preferred_username
default_team = alcf
default_role = member
# Optional: map Globus groups → MLflow teams
# group_team_map =
#     alcf-datascience=datascience
#     alcf-performance=performance
