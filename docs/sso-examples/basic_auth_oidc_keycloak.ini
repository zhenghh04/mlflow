# MLflow auth config with Generic OIDC (Keycloak example)
# Works with any OIDC-compliant IdP: Keycloak, Okta, Auth0, Dex, etc.

[mlflow]
default_permission = READ
database_uri = sqlite:////var/lib/mlflow/auth.db
admin_username = admin
admin_password = ChangeMe@Admin123!
authorization_function = mlflow.server.auth:authenticate_request_basic_auth

[sso]
enabled = true
server_url = https://mlflow.example.com

[sso.providers.keycloak]
provider_type = oidc
name = My Institution
client_id = mlflow
client_secret = YOUR_CLIENT_SECRET
# OIDC discovery URL — Keycloak pattern:
discovery_url = https://sso.institution.edu/realms/my-realm/.well-known/openid-configuration
# Claim used as MLflow username (preferred_username, email, sub, etc.)
username_claim = preferred_username
scope = openid email profile groups
default_team = research
default_role = member
# Optional group → team mapping (from the 'groups' claim in the OIDC token):
# group_team_map =
#     /researchers/datascience=datascience
#     /researchers/performance=performance
