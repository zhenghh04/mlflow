# MLflow auth config with GitHub SSO
# Copy to /etc/mlflow/basic_auth.ini and set MLFLOW_AUTH_CONFIG_PATH

[mlflow]
default_permission = READ
database_uri = sqlite:////var/lib/mlflow/auth.db
admin_username = admin
admin_password = ChangeMe@Admin123!
authorization_function = mlflow.server.auth:authenticate_request_basic_auth
grant_default_workspace_access = false

[sso]
enabled = true
# Public URL of the MLflow server (must match what GitHub OAuth app is configured with)
server_url = https://mlflow.example.com

[sso.providers.github]
provider_type = github
name = GitHub
# From: https://github.com/settings/developers → OAuth Apps → New
client_id = YOUR_GITHUB_CLIENT_ID
client_secret = YOUR_GITHUB_CLIENT_SECRET
# Claim to use as the MLflow username (login = GitHub username, email = email)
username_claim = login
# New SSO users are added to this team with this role
default_team = research
default_role = member
# Optional: map GitHub org memberships → MLflow team slugs
# group_team_map =
#     my-org=datascience
#     perf-org=performance
