# MLflow auth config with Google SSO
# From: https://console.cloud.google.com → APIs & Services → Credentials → OAuth 2.0

[mlflow]
default_permission = READ
database_uri = sqlite:////var/lib/mlflow/auth.db
admin_username = admin
admin_password = ChangeMe@Admin123!
authorization_function = mlflow.server.auth:authenticate_request_basic_auth

[sso]
enabled = true
server_url = https://mlflow.example.com

[sso.providers.google]
provider_type = google
name = Google
client_id = YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com
client_secret = YOUR_GOOGLE_CLIENT_SECRET
username_claim = email
default_team = research
default_role = member
